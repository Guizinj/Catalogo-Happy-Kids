<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Vendedora | Lista de Presentes</title>
    
    <!-- Google Fonts: Poppins e Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==============================
           VARIÁVEIS DE COR E ESTILO
           ============================== */
        :root {
            --primary:#FE5000; /* Roxo/Azul escuro moderno */
            --primary-hover: #FE5000;
            --primary-light: #e0e7ff;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            
            --text-dark: #0f172a;
            --text-muted: #64748b;
            
            --border-color: #e2e8f0;
            --focus-ring: rgba(79, 70, 229, 0.25);
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            
            --transition: all 0.3s ease;
        }

        /* ==============================
           RESET E BASE
           ============================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
        }

        /* ==============================
           LAYOUT PRINCIPAL
           ============================== */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .avatar {
            width: 44px;
            height: 44px;
            background-color: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
        }

        /* ==============================
           SEÇÕES E CARDS
           ============================== */
        .section-title {
            font-size: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-md);
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* ==============================
           FORMULÁRIOS
           ============================== */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--text-dark);
            background-color: var(--bg-body);
            transition: var(--transition);
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background-color: var(--bg-card);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        /* ==============================
           GRID DE PRODUTOS (Para o JS)
           ============================== */
        .produtos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Estilo maravilhoso para o checkbox virar um Card clicável */
        .produto-card {
            display: block; /* Usa block pois é uma label */
            background: var(--bg-body);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            user-select: none;
        }

        .produto-card:hover {
            border-color: var(--primary-light);
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        /* Esconde o checkbox padrão */
        .produto-card input[type="checkbox"] {
            display: none;
        }

        /* Efeito de selecionado usando a classe :has() super moderna do CSS3 */
        .produto-card:has(input:checked) {
            border-color: var(--primary);
            background-color: var(--primary-light);
            box-shadow: var(--shadow-md);
        }

        /* Bolinha de Check customizada no canto */
        .check-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            transition: var(--transition);
        }

        .check-indicator i {
            color: white;
            font-size: 12px;
            opacity: 0;
            transform: scale(0);
            transition: var(--transition);
        }

        .produto-card:has(input:checked) .check-indicator {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .produto-card:has(input:checked) .check-indicator i {
            opacity: 1;
            transform: scale(1);
        }

        /* Conteúdo do Card */
        .produto-imagem {
            width: 100%;
            height: 140px;
            background-color: var(--bg-card);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 32px;
            border: 1px solid var(--border-color);
        }

        .produto-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .produto-nome {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-dark);
        }

        .produto-preco {
            font-weight: 700;
            font-size: 16px;
            color: var(--primary);
        }

        /* ==============================
           BARRA DE AÇÃO FIXA / BOTÃO
           ============================== */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            padding: 24px 0;
            margin-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* ==============================
           RESPONSIVIDADE
           ============================== */
        @media (max-width: 768px) {
            .app-container {
                padding: 16px;
            }
            .card {
                padding: 20px;
            }
            .btn-primary {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Cabeçalho -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-gift"></i>
                <span>GiftList Pro</span>
            </div>
            <div class="user-profile">
                <span>Olá, Vendedora</span>
                <div class="avatar">V</div>
            </div>
        </header>

        <main>
            <!-- SEÇÃO 1: DADOS DO CLIENTE -->
            <section class="card">
                <h2 class="section-title"><i class="far fa-id-card"></i> Dados do Aniversariante</h2>
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>Nome da Criança</label>
                        <div class="input-wrapper">
                            <i class="far fa-user"></i>
                            <input type="text" id="nome-crianca" placeholder="Ex: Joãozinho Silva">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Data da Festa</label>
                        <div class="input-wrapper">
                            <i class="far fa-calendar-alt"></i>
                            <input type="date" id="data-festa">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label>Idade a completar</label>
                        <div class="input-wrapper">
                            <i class="fas fa-birthday-cake"></i>
                            <input type="number" id="idade" placeholder="Ex: 5">
                        </div>
                    </div>
                </div>
            </section>

            <!-- SEÇÃO 2: CATÁLOGO DE PRODUTOS -->
            <section class="card">
                <div class="produtos-header">
                    <h2 class="section-title" style="margin-bottom: 0;"><i class="fas fa-box-open"></i> Sugestões de Presente</h2>
                    
                    <!-- Uma barrinha de busca visual para ficar chique -->
                    <div class="input-wrapper" style="max-width: 300px; width: 100%;">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Buscar no catálogo...">
                    </div>
                </div>

                <!-- 
                  AQUI ENTRA O JAVASCRIPT! 
                  Deixei 3 cards preenchidos via HTML apenas para você ver o layout funcionando.
                  Quando fizer o JS, você vai limpar essa div e injetar os labels dinamicamente.
                -->
                <div class="produtos-grid" id="lista-de-produtos-banco">
                    
                    <!-- Exemplo de Card 1 (ID 10) -->
                    <label class="produto-card">
                        <!-- O input fica escondido, mas o JS ainda lê ele! -->
                        <input type="checkbox" class="brinquedo-item" value="10">
                        <div class="check-indicator"><i class="fas fa-check"></i></div>
                        
                        <div class="produto-imagem">
                            <i class="fas fa-robot"></i> <!-- Aqui entrará a tag <img> com a foto real -->
                        </div>
                        <div class="produto-info">
                            <span class="produto-nome">Boneco do Batman</span>
                            <span class="produto-preco">R$ 89,90</span>
                        </div>
                    </label>

                    <!-- Exemplo de Card 2 (ID 42) -->
                    <label class="produto-card">
                        <input type="checkbox" class="brinquedo-item" value="42">
                        <div class="check-indicator"><i class="fas fa-check"></i></div>
                        
                        <div class="produto-imagem">
                            <i class="fas fa-futbol"></i>
                        </div>
                        <div class="produto-info">
                            <span class="produto-nome">Bola de Futebol Oficial</span>
                            <span class="produto-preco">R$ 120,00</span>
                        </div>
                    </label>

                    <!-- Exemplo de Card 3 (ID 15) -->
                    <label class="produto-card">
                        <input type="checkbox" class="brinquedo-item" value="15">
                        <div class="check-indicator"><i class="fas fa-check"></i></div>
                        
                        <div class="produto-imagem">
                            <i class="fas fa-gamepad"></i>
                        </div>
                        <div class="produto-info">
                            <span class="produto-nome">Lego Star Wars</span>
                            <span class="produto-preco">R$ 249,90</span>
                        </div>
                    </label>

                </div>
            </section>

            <!-- AÇÕES -->
            <div class="action-bar">
                <button class="btn-primary" onclick="alert('Lógica do JS entrará aqui!')">
                    <i class="fab fa-whatsapp" style="font-size: 20px;"></i> 
                    Gerar e Enviar Link
                </button>
            </div>

        </main>
    </div>

</body>
</html>
